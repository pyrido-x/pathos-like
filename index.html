<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 Pathos 在线 — 种子地牢</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0a0a12;color:#c8c8d0;overflow:hidden;height:100vh;width:100vw}
#lo{position:fixed;inset:0;z-index:100;background:radial-gradient(ellipse at center,#1a1a2e,#0a0a12);display:flex;align-items:center;justify-content:center}
.lb{text-align:center;padding:44px 38px;background:rgba(20,20,40,.96);border:1px solid #333;border-radius:14px;box-shadow:0 0 80px rgba(100,100,255,.15);max-width:460px;width:92%}
.lb h1{font-size:2.3em;letter-spacing:3px;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lb .sub{color:#777;font-size:.88em;margin-bottom:26px}
.lb input{display:block;width:100%;padding:13px 16px;margin-bottom:12px;background:#1a1a2e;color:#eee;border:1px solid #444;border-radius:8px;font-size:1em;outline:none}
.lb input:focus{border-color:#FFD700}
.lb button{width:100%;padding:15px;margin-top:6px;background:linear-gradient(135deg,#FFD700,#FF8C00);color:#1a1a2e;border:none;border-radius:8px;font-size:1.15em;font-weight:bold;cursor:pointer}
.lb button:hover{transform:scale(1.02);box-shadow:0 0 24px rgba(255,215,0,.45)}
.cc{display:flex;gap:10px;margin-bottom:16px}
.cd{flex:1;padding:14px 8px;border-radius:10px;cursor:pointer;border:2px solid transparent;text-align:center;transition:all .2s;background:rgba(255,255,255,.03);font-size:.85em}
.cd:hover{background:rgba(255,255,255,.07)}.cd.sel{border-color:#FFD700;background:rgba(255,215,0,.12)}
.cd .icon{font-size:2.2em;display:block;margin-bottom:4px}.cd .cn{font-weight:bold;color:#eee}.cd .cde{font-size:.72em;color:#888;margin-top:3px}
#game{display:none;height:100vh;width:100vw}#ga{flex:1;position:relative;min-width:0;background:#000}
#ga canvas{display:block;width:100%;height:100%}
#sb{width:300px;background:#111122;border-left:1px solid #2a2a3a;display:flex;flex-direction:column;overflow-y:auto;font-size:.84em;padding:0;flex-shrink:0}
#gl{display:flex;height:100%}
.ss{padding:10px 14px;border-bottom:1px solid #1a1a2e}.ss h3{color:#FFD700;font-size:.88em;margin-bottom:6px}
.sr{display:flex;justify-content:space-between;padding:2px 0}.sr .lbl{color:#888}.sr .val{color:#eee;font-weight:bold}
.hb{background:#333;height:10px;border-radius:5px;margin:6px 0;overflow:hidden}.hf{background:linear-gradient(90deg,#F33,#F66);height:100%;border-radius:5px;transition:width .3s}
.xb{background:#333;height:6px;border-radius:3px;margin:4px 0;overflow:hidden}.xf{background:linear-gradient(90deg,#48F,#6AF);height:100%;border-radius:3px;transition:width .3s}
.es{display:flex;justify-content:space-between;padding:2px 0;font-size:.82em}.es .slt{color:#888}.es .ei{color:#FFD700}
.ii{padding:4px 8px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;font-size:.85em;cursor:pointer}
.ii:hover{background:rgba(255,255,255,.05)}.ii .hk{color:#FFD700;margin-right:8px;font-weight:bold;min-width:22px}
.ii .nm{flex:1}.ii .ia{display:flex;gap:4px}
.ii .ia button{background:#2a2a3a;color:#aaa;border:1px solid #444;border-radius:4px;padding:2px 8px;font-size:.75em;cursor:pointer}
.ii .ia button:hover{background:#555;color:#fff}
.pr{padding:3px 0;display:flex;align-items:center;gap:6px;font-size:.84em}
.pd{width:9px;height:9px;border-radius:50%;flex-shrink:0}.pn{flex:1;color:#ddd}.pi{color:#888;font-size:.8em}
#la{flex:1;overflow-y:auto;padding:10px 14px;min-height:140px;max-height:220px}
.lm{padding:2px 0;font-size:.8em;word-break:break-word;line-height:1.5}.lm .t{color:#444;margin-right:6px;font-size:.9em}
.cm .a{font-weight:bold;margin-right:4px}
#cf{display:flex;padding:8px 14px;gap:6px;border-top:1px solid #1a1a2e}
#ci{flex:1;padding:9px 12px;background:#1a1a2e;color:#eee;border:1px solid #444;border-radius:6px;font-size:.88em;outline:none}
#ci:focus{border-color:#FFD700}#cs{padding:9px 16px;background:#2a2a3a;color:#FFD700;border:1px solid #444;border-radius:6px;cursor:pointer}
#cs:hover{background:#3a3a4a}
#do{position:fixed;inset:0;z-index:50;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
#do.show{opacity:1}#do .msg{font-size:3.5em;color:#F00;font-weight:bold;letter-spacing:4px;text-shadow:0 0 40px rgba(255,0,0,.7);animation:pl .7s ease-in-out}
@keyframes pl{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#hb2{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(5,5,15,.93);padding:8px 22px;border-radius:8px;font-size:.82em;color:#bbb;border:1px solid #444;white-space:nowrap;pointer-events:none;z-index:10}
#hb2 span{color:#FFD700;font-weight:bold}
</style>
</head>
<body>

<div id="lo"><div class="lb">
<h1>🏰 Pathos 在线</h1><p class="sub">种子地牢 · 假门陷阱 · 50层 · 逃离得分</p>
<input id="ni" placeholder="输入名字……" maxlength="12" autofocus>
<div class="cc" id="ccd"><div class="cd sel" data-class="warrior"><span class="icon">⚔️</span><span class="cn">战士</span><span class="cde">HP38 力量16</span></div><div class="cd" data-class="wizard"><span class="icon">🧙</span><span class="cn">法师</span><span class="cde">HP22 魔法</span></div><div class="cd" data-class="rogue"><span class="icon">🗡️</span><span class="cn">盗贼</span><span class="cde">HP26 暴击</span></div></div>
<button id="jb">⚡ 进入地牢</button>
</div></div>

<div id="game"><div id="gl">
<div id="ga"><canvas id="cv"></canvas></div>
<div id="sb">
<div class="ss"><h3>🧑 角色</h3>
<div class="sr"><span class="lbl">名字</span><span class="val" id="sn">—</span></div><div class="sr"><span class="lbl">职业</span><span class="val" id="sc">—</span></div>
<div class="hb"><div class="hf" id="hbf" style="width:100%"></div></div><div class="sr"><span class="lbl">生命</span><span class="val" id="sh">—</span></div>
<div class="xb"><div class="xf" id="xbf" style="width:0%"></div></div><div class="sr"><span class="lbl">等级 / 深度</span><span class="val" id="sl">—</span></div>
<div class="sr"><span class="lbl">力/敏</span><span class="val" id="ss">—</span></div><div class="sr"><span class="lbl">金币/击杀</span><span class="val" id="se">—</span></div>
</div>
<div class="ss"><h3>⚔️ 装备</h3>
<div class="es"><span class="slt">武器</span><span class="ei" id="ew">空手</span></div><div class="es"><span class="slt">护甲</span><span class="ei" id="ea">无</span></div><div class="es"><span class="slt">戒指</span><span class="ei" id="er">无</span></div>
</div>
<div class="ss"><h3>🎒 背包 [I]</h3><div id="il"><span style="color:#555">按 I 打开</span></div></div>
<div class="ss"><h3>👥 玩家 <span id="pc">(0)</span></h3><div id="pl"></div></div>
<div id="la"></div>
<form id="cf" onsubmit="return sc()"><input id="ci" placeholder="聊天… (Enter)" maxlength="150"><button type="submit" id="cs">发送</button></form>
</div>
</div></div>

<div id="do"><div class="msg">💀 你死了</div></div>
<div id="hb2"><span>方向键/WASD</span> 移动 · <span>走向门</span>=推开 · <span>G</span>拾取 · <span>E</span>吃 · <span>I</span>背包 · <span>Enter</span>聊天</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const VOID=0,WALL=1,FLOOR=2,CLOSED=3,OPEN=4,U=5,D=6,TS=28;
const $=id=>document.getElementById(id);
const cv=$('cv'),ctx=cv.getContext('2d'),ci=$('ci');
let so,my,md,map=null,mw=80,mh=64,gs=null,cx=0,cy=0,tx=0,ty=0,df=0;
let lm=[],ML=100,cls='warrior',si=false,st=new Set(),od=new Set();

// login
document.querySelectorAll('.cd').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.cd').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');cls=c.dataset.class;}));
$('ni').addEventListener('keydown',e=>{if(e.key==='Enter')j();});$('jb').addEventListener('click',j);
function j(){$('lo').style.display='none';$('game').style.display='block';requestAnimationFrame(()=>{ic();cn();});}
function ic(){cv.width=$('ga').clientWidth||1280;cv.height=$('ga').clientHeight||800;if(cv.width<300){cv.width=1280;cv.height=800;}window.addEventListener('resize',()=>{cv.width=$('ga').clientWidth||1280;cv.height=$('ga').clientHeight||800;});}

// network
function cn(){
  so=io();md=null;gs=null;st=new Set();od=new Set();
  so.on('connect',()=>{so.emit('join',{name:$('ni').value.trim()||'冒险者',class:cls});al('🔗 连接中……','#0f0');});
  so.on('welcome',d=>{
    my=d.you.id;md=d.you;map=d.map;mw=map[0].length;mh=map.length;
    gs={ps:[],ms:[],is:[],level:d.level};od=new Set(d.openDoors||[]);
    st=new Set(d.you.seenTiles||[]);uu();al(`🎉 欢迎，${d.you.name}！第 ${d.level}/${50} 层`,'#FFD700');
  });
  so.on('newLevel',d=>{map=d.map;mw=map[0].length;mh=map.length;od=new Set(d.openDoors||[]);st=new Set();al(`🏰 第 ${d.level} 层`,'#FFD700');});
  so.on('gameState',s=>{
    gs=s;if(s.openDoors)od=new Set(s.openDoors);
    const me=s.ps.find(p=>p.id===my);
    if(me){md.hp=me.hp;md.mhp=me.mhp;md.lvl=me.lvl;md.str=me.str;md.dex=me.dex;md.gold=me.gold;md.x=me.x;md.y=me.y;md.alive=me.alive;md.depth=me.depth;md.kills=me.kills;}
    uu();
  });
  so.on('syncPlayer',d=>{md=d;if(d.seenTiles)st=new Set(d.seenTiles);uu();});
  so.on('log',d=>{if(d.global)al(d.msg,'#aaa');else al(d.msg,'#ddd');});
  so.on('chat',d=>al(`<span class="cm"><span class="a" style="color:${d.color}">${d.from}:</span> ${es(d.msg)}</span>`,null));
  so.on('disconnect',()=>al('⚠️ 断开连接，刷新。','#f44'));
  so.on('escaped',d=>{
    md=null;gs=null;map=null;st=new Set();
    al('🏆🏆 你逃出了地牢！🏆🏆','#FFD700');
    al(`得分: ${d.score} (Lv${d.lvl}·击杀${d.kills}·💰${d.gold}·最深${d.depth}层)`,'#FFD700');
    al('刷新页面重新开始。','#aaa');
    setTimeout(()=>{$('game').style.display='none';$('lo').style.display='flex';$('ni').focus();},3000);
  });
}

// keyboard
const km={ArrowUp:{dx:0,dy:-1},ArrowDown:{dx:0,dy:1},ArrowLeft:{dx:-1,dy:0},ArrowRight:{dx:1,dy:0},w:{dx:0,dy:-1},s:{dx:0,dy:1},a:{dx:-1,dy:0},d:{dx:1,dy:0},k:{dx:0,dy:-1},j:{dx:0,dy:1},h:{dx:-1,dy:0},l:{dx:1,dy:0}};
document.addEventListener('keydown',e=>{
  if(!so||!md)return;if(document.activeElement===ci){if(e.key==='Escape')ci.blur();return;}
  const k=e.key,m=km[k];if(m){e.preventDefault();so.emit('move',m);return;}
  switch(k){case'g':case'G':case',':e.preventDefault();so.emit('pickup');break;case'e':case'E':e.preventDefault();so.emit('eat',{});break;case'i':case'I':e.preventDefault();ti();break;case'>':case'.':e.preventDefault();so.emit('descend');break;case'<':e.preventDefault();so.emit('ascend');break;case'Enter':e.preventDefault();ci.focus();break;case'Escape':e.preventDefault();hi();break;}
});

// inventory
function ti(){si=!si;uii();}function hi(){si=false;uii();}
function uii(){const d=$('il');if(!md||!si){d.innerHTML='<span style="color:#555">按 I 打开</span>';return;}let h='',i=0;if(md.weapon){h+=ir(i,md.weapon,'⚔','weapon');i++;}if(md.armor){h+=ir(i,md.armor,'🛡','armor');i++;}if(md.ring){h+=ir(i,md.ring,'💍','ring');i++;}if(md.inv)for(const it of md.inv){h+=ir(i,it,hk(i),null);i++;}if(!h)h='<span style="color:#555">空空如也</span>';d.innerHTML=h;d.querySelectorAll('button').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const a=b.dataset.action,i=parseInt(b.dataset.idx);if(a==='equip')so.emit('equip',{idx:i});else if(a==='unequip')so.emit('unequip',{slot:b.dataset.slot});else if(a==='use')so.emit('use',{idx:i});else if(a==='eat')so.emit('eat',{idx:i});else if(a==='drop')so.emit('drop',{idx:i});}));}
function ir(idx,it,key,es){const eq=!!es;let a='';if(eq)a=`<button data-action="unequip" data-slot="${es}">卸下</button>`;else{if(it.cat==='武器'||it.cat==='护甲'||it.cat==='戒指')a+=`<button data-action="equip" data-idx="${idx}">装备</button>`;if(it.cat==='药水'||it.cat==='卷轴')a+=`<button data-action="use" data-idx="${idx}">使用</button>`;if(it.cat==='食物'||it.cat==='尸体')a+=`<button data-action="eat" data-idx="${idx}">吃掉</button>`;if(it.cat!=='尸体')a+=`<button data-action="drop" data-idx="${idx}">丢弃</button>`;}return `<div class="ii"><span class="hk">${key}</span><span class="nm">${it.e||'📦'} ${it.n}${eq?' <span style="color:#FFD700">[装]</span>':''}</span><span class="ia">${a}</span></div>`;}
function hk(i){return String.fromCharCode(97+(i%26));}

// UI
function uu(){if(!md)return;$('sn').textContent=md.name;$('sc').textContent=md.cls+' Lv'+md.lvl;$('hbf').style.width=(md.mhp>0?md.hp/md.mhp*100:0)+'%';$('sh').textContent=`${md.hp}/${md.mhp}`;const xn=md.lvl*140;$('xbf').style.width=((md.xp||0)/xn*100)+'%';$('sl').textContent=`Lv${md.lvl} / 第${md.depth||1}层`;$('ss').textContent=`${md.str} / ${md.dex}`;$('se').textContent=`💰${md.gold||0} ⚔${md.kills||0}`;$('ew').textContent=md.weapon?`${md.weapon.e||''} ${md.weapon.n}${md.weapon.atk?'+'+md.weapon.atk:''}`:'空手';$('ea').textContent=md.armor?`${md.armor.e||''} ${md.armor.n}${md.armor.def?'+'+md.armor.def:''}`:'无';$('er').textContent=md.ring?`${md.ring.e||''} ${md.ring.n}`:'无';uii();up();ul();if(!md.alive){$('do').classList.add('show');setTimeout(()=>$('do').classList.remove('show'),2500);}}
function up(){if(!gs)return;const ps=gs.ps||[];$('pc').textContent=`(${ps.length})`;let h='';for(const p of ps)h+=`<div class="pr"><div class="pd" style="background:${p.color}"></div><span class="pn">${p.id===my?'▶ ':''}${es(p.name)}</span><span class="pi">Lv${p.lvl}</span></div>`;if(!h)h='<span style="color:#555">暂无</span>';$('pl').innerHTML=h;}
function al(m,c){lm.push({m,c,t:Date.now()});if(lm.length>ML)lm.shift();ul();}
function ul(){const a=$('la');let h='';for(const l of lm){const t=new Date(l.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});h+=`<div class="lm"${l.c?` style="color:${l.c}"`:''}><span class="t">${t}</span>${l.m}</div>`;}a.innerHTML=h;a.scrollTop=a.scrollHeight;}
function es(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function sc(){const m=ci.value.trim();if(m&&so){so.emit('chat',{msg:m});ci.value='';ci.blur();}return false;}
let lh=null;setInterval(()=>{if(md&&lh!==null&&md.hp<lh)df=Math.min(1,df+.35+(lh-md.hp)*.04);lh=md?md.hp:null;},250);

// render
function rd(){
  requestAnimationFrame(rd);
  if(!map||!md)return;
  const w=cv.width,h=cv.height;
  ctx.fillStyle='#020208';ctx.fillRect(0,0,w,h);

  const px=md.x*TS+TS/2,py=md.y*TS+TS/2;
  tx=px-w/2;ty=py-h/2;cx+=(tx-cx)*.16;cy+=(ty-cy)*.16;

  const sx=Math.max(0,Math.floor(cx/TS)-1),sy=Math.max(0,Math.floor(cy/TS)-1);
  const ex=Math.min(mw-1,Math.ceil((cx+w)/TS)+1),ey=Math.min(mh-1,Math.ceil((cy+h)/TS)+1);

  // void stars
  for(let x=0;x<w;x+=TS*2)for(let y=0;y<h;y+=TS*2){if((x^y)&4)continue;ctx.fillStyle='rgba(255,255,255,.012)';ctx.fillRect(x,y,1,1);}

  for(let y=sy;y<=ey;y++){
    for(let x=sx;x<=ex;x++){
      if(!map[y])continue;
      const dx=x*TS-cx,dy=y*TS-cy;
      const tile=map[y][x];const seen=st.has(`${x},${y}`);
      if(tile===VOID||!seen)continue;
      const isOpen=od.has(`${x},${y}`);

      if(tile===WALL){ctx.fillStyle='#2a2832';ctx.fillRect(dx,dy,TS,TS);ctx.fillStyle='#1e1a24';ctx.fillRect(dx+1,dy+1,TS-2,TS-2);ctx.fillStyle='#3a3444';ctx.fillRect(dx+4,dy+4,Math.floor(TS/2)-4,2);ctx.fillStyle='#3a3444';ctx.fillRect(dx+4,dy+Math.floor(TS/2),Math.floor(TS/2)-4,2);}
      else if(tile===CLOSED&&!isOpen){ctx.fillStyle='#2a2832';ctx.fillRect(dx,dy,TS,TS);ctx.fillStyle='#201c28';ctx.fillRect(dx+2,dy+2,TS-4,TS-4);ctx.fillStyle='#554420';ctx.fillRect(dx+TS/2-3,dy+1,6,TS-2);ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('🚪',dx+TS/2,dy+TS/2+5);ctx.textAlign='start';}
      else if((tile===CLOSED&&isOpen)||tile===OPEN){ctx.fillStyle='#1a1820';ctx.fillRect(dx,dy,TS,TS);ctx.fillStyle='#25222c';ctx.fillRect(dx+TS/2-3,dy+1,2,TS-2);ctx.fillStyle='#25222c';ctx.fillRect(dx+TS/2+1,dy+1,2,TS-2);}
      else{ctx.fillStyle='#1a1820';ctx.fillRect(dx,dy,TS,TS);ctx.fillStyle='#1e1c26';ctx.fillRect(dx+TS/2-1,dy+TS/2-1,2,2);if(tile===D){ctx.fillStyle='#FFD700';ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.fillText('⬇',dx+TS/2,dy+TS/2+7);ctx.textAlign='start';}if(tile===U){ctx.fillStyle='#FFD700';ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.fillText('⬆',dx+TS/2,dy+TS/2+7);ctx.textAlign='start';}}
    }
  }

  if(!gs)return;
  for(const it of(gs.is||[])){if(!st.has(`${it.x},${it.y}`))continue;const dx=it.x*TS-cx,dy=it.y*TS-cy;if(dx<-TS||dx>w+TS||dy<-TS||dy>h+TS)continue;if(it.cat==='武器'||it.cat==='护甲'||it.cat==='戒指'){const sh=Math.sin(Date.now()/400+it.x+it.y)*.25+.25;ctx.fillStyle=`rgba(255,215,0,${sh})`;ctx.fillRect(dx,dy,TS,TS);}ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText(it.e||'📦',dx+TS/2,dy+TS/2+6);ctx.textAlign='start';}
  for(const m of(gs.ms||[])){if(!st.has(`${m.x},${m.y}`))continue;const dx=m.x*TS-cx,dy=m.y*TS-cy;if(dx<-TS||dx>w+TS||dy<-TS||dy>h+TS)continue;ctx.fillStyle='rgba(40,5,5,.5)';ctx.fillRect(dx+1,dy+1,TS-2,TS-2);ctx.font='20px sans-serif';ctx.textAlign='center';ctx.fillText(m.e||'👾',dx+TS/2,dy+TS/2+7);ctx.textAlign='start';if(m.hp<m.mhp){const bw=TS-4;ctx.fillStyle='#222';ctx.fillRect(dx+2,dy-5,bw,4);ctx.fillStyle='#F44';ctx.fillRect(dx+2,dy-5,bw*(m.hp/m.mhp),4);}ctx.fillStyle='#ccc';ctx.font='9px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText(m.n,dx+TS/2,dy-8);ctx.textAlign='start';}
  for(const pl of(gs.ps||[])){const dx=pl.x*TS-cx,dy=pl.y*TS-cy;if(dx<-TS||dx>w+TS||dy<-TS||dy>h+TS)continue;const me=pl.id===my;if(me){const p=Math.sin(Date.now()/350)*.3+.7;ctx.fillStyle=`rgba(255,255,255,${p*.25})`;ctx.fillRect(dx-3,dy-3,TS+6,TS+6);}ctx.fillStyle=pl.color||'#FFF';ctx.fillRect(dx+2,dy+2,TS-4,TS-4);ctx.fillStyle='#FFF';ctx.font=`bold ${TS-8}px monospace`;ctx.textAlign='center';ctx.fillText('@',dx+TS/2,dy+TS/2+7);ctx.textAlign='start';ctx.fillStyle='#FFF';ctx.font='bold 10px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText(me?'▼ 我':pl.name,dx+TS/2,dy-7);ctx.textAlign='start';if(me||pl.hp<pl.mhp){const bw=TS-2;ctx.fillStyle='#222';ctx.fillRect(dx+1,dy-1,bw,3);ctx.fillStyle=me?'#0f0':'#F88';ctx.fillRect(dx+1,dy-1,bw*(pl.hp/pl.mhp),3);}}

  if(df>0){ctx.fillStyle=`rgba(255,0,0,${df*.3})`;ctx.fillRect(0,0,w,h);df-=.02;}
  if(md&&!md.alive){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,w,h);ctx.fillStyle='#F00';ctx.font='bold 48px "Microsoft YaHei",sans-serif';ctx.textAlign='center';ctx.fillText('💀 你死了',w/2,h/2);ctx.fillStyle='#FFF';ctx.font='16px "Microsoft YaHei",sans-serif';ctx.fillText('等待复活……',w/2,h/2+40);ctx.textAlign='start';}
}
rd();$('ni').focus();
</script>
